{{- $ga := site.Params.analytics.google -}}
{{- if and $ga (isset $ga "measurementID") -}}
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ $ga.measurementID }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', '{{ $ga.measurementID }}');
</script>
{{- end -}}
